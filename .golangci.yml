version: "2"

run:
  timeout: 10m

output:
  formats:
    text:
      path: stdout
      colors: true

formatters:
  enable:
    - goimports
    - gofmt
  settings:
    goimports:
      local-prefixes:
        - github.com/crossplane-contrib/provider-upjet-digitalocean
    gofmt:
      simplify: true

linters:
  default: none
  enable:
    - govet
    - gocyclo
    - gocritic
    - goconst
    - prealloc
    - revive
    - unconvert
    - misspell
    - nakedret
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gosec

  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true

    errcheck:
      check-type-assertions: false
      check-blank: false

    govet:
      enable-all: false

    gocyclo:
      min-complexity: 10

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 5

    lll:
      tab-width: 1

    unparam:
      check-exported: false

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    gocritic:
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
        rangeValCopy:
          sizeThreshold: 32

  exclusions:
    rules:
      - path: _test(ing)?\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - unparam

      - path: _test\.go
        text: "(unnamedResult|exitAfterDefer)"
        linters:
          - gocritic

      - text: "(hugeParam|rangeValCopy):"
        linters:
          - gocritic

      - text: "SA3000:"
        linters:
          - staticcheck

      - text: "k8s.io/api/core/v1"
        linters:
          - goimports

      - text: "G101:"
        linters:
          - gosec

      - text: "G104:"
        linters:
          - gosec

    paths:
      - "zz_\\..+\\.go$"

issues:
  new: false
  max-same-issues: 0
