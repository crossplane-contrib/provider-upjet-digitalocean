apiVersion: droplet.digitalocean.m.crossplane.io/v1alpha1
kind: Snapshot
metadata:
  annotations:
    meta.upbound.io/example-id: droplet/v1alpha1/snapshot
  labels:
    testing.upbound.io/example-name: web-snapshot
  name: web-snapshot
  namespace: upbound-system
spec:
  forProvider:
    dropletIdSelector:
      matchLabels:
        testing.upbound.io/example-name: web
    name: web-snapshot-01

---

apiVersion: droplet.digitalocean.m.crossplane.io/v1alpha1
kind: Droplet
metadata:
  annotations:
    meta.upbound.io/example-id: droplet/v1alpha1/snapshot
  labels:
    testing.upbound.io/example-name: from-snapshot
  name: from-snapshot
  namespace: upbound-system
spec:
  forProvider:
    imageSelector:
      matchLabels:
        testing.upbound.io/example-name: web-snapshot
    name: web-02
    region: nyc3
    size: s-2vcpu-4gb

---

apiVersion: droplet.digitalocean.m.crossplane.io/v1alpha1
kind: Droplet
metadata:
  annotations:
    meta.upbound.io/example-id: droplet/v1alpha1/snapshot
  labels:
    testing.upbound.io/example-name: web
  name: web
  namespace: upbound-system
spec:
  forProvider:
    imageSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    name: web-01
    region: nyc3
    size: s-1vcpu-1gb
