apiVersion: networking.digitalocean.m.crossplane.io/v1alpha1
kind: Loadbalancer
metadata:
  annotations:
    meta.upbound.io/example-id: networking/v1alpha1/loadbalancer
  labels:
    testing.upbound.io/example-name: public
  name: public
  namespace: upbound-system
spec:
  forProvider:
    dropletIdsRefs:
    - name: web
    forwardingRule:
    - entryPort: 80
      entryProtocol: http
      targetPort: 80
      targetProtocol: http
    healthcheck:
    - port: 22
      protocol: tcp
    name: loadbalancer-1
    region: nyc3

---

apiVersion: droplet.digitalocean.m.crossplane.io/v1alpha1
kind: Droplet
metadata:
  annotations:
    meta.upbound.io/example-id: networking/v1alpha1/loadbalancer
  labels:
    testing.upbound.io/example-name: web
  name: web
  namespace: upbound-system
spec:
  forProvider:
    imageSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    name: web-1
    region: nyc3
    size: s-1vcpu-1gb
