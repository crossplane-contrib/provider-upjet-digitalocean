apiVersion: spaces.digitalocean.m.crossplane.io/v1alpha1
kind: BucketLogging
metadata:
  annotations:
    meta.upbound.io/example-id: spaces/v1alpha1/bucketlogging
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    bucketSelector:
      matchLabels:
        testing.upbound.io/example-name: assets
    region: '%s'
    targetBucketSelector:
      matchLabels:
        testing.upbound.io/example-name: logs
    targetPrefix: access-logs/

---

apiVersion: spaces.digitalocean.m.crossplane.io/v1alpha1
kind: Bucket
metadata:
  annotations:
    meta.upbound.io/example-id: spaces/v1alpha1/bucketlogging
  labels:
    testing.upbound.io/example-name: assets
  name: assets
  namespace: upbound-system
spec:
  forProvider:
    region: nyc3

---

apiVersion: spaces.digitalocean.m.crossplane.io/v1alpha1
kind: Bucket
metadata:
  annotations:
    meta.upbound.io/example-id: spaces/v1alpha1/bucketlogging
  labels:
    testing.upbound.io/example-name: logs
  name: logs
  namespace: upbound-system
spec:
  forProvider:
    region: nyc3
