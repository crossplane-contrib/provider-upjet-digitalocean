                    description: 'Enables tracking of function call counts and time
                      used. The default value is top. Supported values are: all, pl,
                      none.'
                    type: string
                  trackIoTiming:
                    description: 'Enables timing of database I/O calls. This parameter
                      is off by default, because it will repeatedly query the operating
                      system for the current time, which may cause significant overhead
                      on some platforms. The default value is top. Supported values
                      are: off, on.'
                    type: string
                  walSenderTimeout:
                    description: Terminate replication connections that are inactive
                      for longer than this amount of time, in milliseconds. Setting
                      this value to zero disables the timeout. Must be either 0 or
                      between 5000 and 10800000.
                    type: number
                  walWriterDelay:
                    description: WAL flush interval in milliseconds. Note that setting
                      this value to lower than the default 200ms may negatively impact
                      performance
                    type: number
                  workMem:
                    description: The maximum amount of memory, in MB, used by a query
                      operation (such as a sort or hash table) before writing to temporary
                      disk files. Default is 1MB + 0.075% of total RAM (up to 32MB).
                    type: number
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
